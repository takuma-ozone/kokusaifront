<div class="NSISBO08D01">
  <!-- 荷送人選択パネル -->
  <!-- TODO: ポップアップの表示・非表示を制御するモデルを修正してください -->
  <ra-popup title="荷送人選択" :visible.sync="isVisible">
    <!-- エラーメッセージガイドの表示 -->
    <ro-message-guide></ro-message-guide>

    <div style="margin-top: 10px;">
      <rm-input
        com-id="xxx"
        caption="INPUT"
        validate="numeric"
        v-model="text1"
        label-width="2"
      ></rm-input>
    </div>

    <div class="">
      <!-- テーブル上のツールバー領域 -->
      <vxe-toolbar id="toolbar" setting resizable></vxe-toolbar>
      <!-- テーブル -->
      <!-- TODO テーブルに検索結果一覧モデルをバインドしてください -->
      <vxe-table ref="vxeTable" height="250" :data.sync="bind.nisoninDtoList">
        <vxe-table-column type="radio" align="center" width="40"></vxe-table-column>
        <vxe-table-column field="nisoninCode" width="120" title="お客様コード"></vxe-table-column>
        <vxe-table-column field="meisho1" width="120" title="名称１"></vxe-table-column>
        <vxe-table-column field="meisho2" width="120" title="名称２"></vxe-table-column>
        <vxe-table-column field="telNo" width="120" title="電話番号"></vxe-table-column>
        <vxe-table-column field="postNo" width="120" title="郵便番号"></vxe-table-column>
        <vxe-table-column field="jusho1" width="120" title="住所１"></vxe-table-column>
        <vxe-table-column field="jusho2" width="120" title="住所２"></vxe-table-column>
      </vxe-table>
    </div>

    <!-- フッターパネル -->
    <!-- TODO: 以下のfooter要素を`ra-popup`タグ内に移動して`template`タグのコメントアウトを外してください -->
    <template #footer>
      <!-- 閉じるボタン -->
      <!-- TODO ボタンに紐づくメソッドを追加してください -->
      <ra-button @click="">閉じる</ra-button>

      <!-- 決定ボタン -->
      <!-- TODO ボタンに紐づくメソッドを追加してください -->
      <ra-button @click="">決定</ra-button>
    </template>
  </ra-popup>
</div>
